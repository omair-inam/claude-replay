<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Replay</title>
<style>
/*THEME_CSS*/

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
  font-size: 13px;
  line-height: 1.6;
}

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0;
}

/* Controls bar */
.controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.controls button {
  background: var(--bg-hover);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 12px;
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.controls button:hover { background: var(--border); }
.controls button.active { background: var(--accent-dim); border-color: var(--accent); }

.progress-wrap {
  flex: 1;
  min-width: 120px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.progress-bar {
  flex: 1;
  height: 4px;
  background: var(--bg);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.2s;
}

.progress-text {
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
}

.speed-control {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-dim);
}
.speed-control input[type="range"] {
  width: 60px;
  accent-color: var(--accent);
}

.toggle-group {
  display: flex;
  gap: 6px;
  font-size: 11px;
}
.toggle-group label {
  display: flex;
  align-items: center;
  gap: 3px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
}
.toggle-group input[type="checkbox"] { accent-color: var(--accent); }

/* Transcript area */
.transcript {
  padding: 16px;
  padding-bottom: 100vh;
  min-height: calc(100vh - 50px);
}

.turn {
  margin-bottom: 24px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.4s, transform 0.3s;
  scroll-margin-top: 52px;
}
.turn.visible {
  opacity: 0.35;
  transform: translateY(0);
}
.turn.visible.active {
  opacity: 1;
}

/* User message */
.user-msg {
  margin-bottom: 8px;
}
.user-prompt {
  color: var(--accent);
  font-weight: 600;
}
.user-text {
  color: var(--text-bright);
  white-space: pre-wrap;
  word-break: break-word;
}

/* Timestamp */
.timestamp {
  font-size: 10px;
  color: var(--text-dim);
  margin-bottom: 4px;
}

/* Assistant text */
.assistant-text {
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  margin: 6px 0;
  padding-left: 4px;
}

/* Tool call */
.tool-block {
  margin: 6px 0;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  background: var(--tool-bg);
}
.tool-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.tool-header:hover { background: var(--bg-hover); }
.tool-indicator {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--blue);
  flex-shrink: 0;
}
.tool-name {
  color: var(--cyan);
  font-weight: 600;
}
.tool-args-preview {
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.tool-chevron {
  color: var(--text-dim);
  font-size: 10px;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.tool-block.open .tool-chevron { transform: rotate(90deg); }

.tool-body {
  display: none;
  border-top: 1px solid var(--border);
}
.tool-block.open .tool-body { display: block; }

.tool-input, .tool-result {
  padding: 8px 10px;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 300px;
  overflow-y: auto;
}
.tool-input {
  color: var(--text-dim);
  background: var(--tool-bg);
}
.tool-result {
  background: var(--bg);
  border-top: 1px solid var(--border);
  color: var(--green);
}
.tool-result-label, .tool-input-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 4px;
  font-weight: 600;
}

/* Tool group (consecutive tool calls) */
.tool-group {
  margin: 6px 0;
}
.tool-group-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  cursor: pointer;
  user-select: none;
  font-size: 12px;
  color: var(--cyan);
  font-weight: 600;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--tool-bg);
  transition: background 0.15s;
}
.tool-group-header:hover { background: var(--bg-hover); }
.tool-group-chevron {
  font-size: 10px;
  color: var(--text-dim);
  transition: transform 0.2s;
}
.tool-group.open .tool-group-chevron { transform: rotate(90deg); }
.tool-group-names {
  color: var(--text-dim);
  font-weight: 400;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.tool-group-body {
  display: none;
}
.tool-group.open .tool-group-body { display: block; }
.tool-group.open .tool-group-header {
  border-radius: 6px 6px 0 0;
  border-bottom: none;
}

/* Thinking block */
.thinking-block {
  margin: 6px 0;
  border-left: 2px solid var(--text-dim);
  padding-left: 10px;
}
.thinking-header {
  font-size: 11px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 4px;
}
.thinking-header:hover { color: var(--text); }
.thinking-chevron {
  font-size: 10px;
  transition: transform 0.2s;
}
.thinking-block.open .thinking-chevron { transform: rotate(90deg); }
.thinking-body {
  display: none;
  color: var(--text-dim);
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
  margin-top: 4px;
  max-height: 400px;
  overflow-y: auto;
}
.thinking-block.open .thinking-body { display: block; }

/* Turn header bar */
.turn-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  border-radius: 6px 6px 0 0;
  cursor: pointer;
  user-select: none;
  font-size: 11px;
  color: var(--text-dim);
}
.turn-header:hover { background: var(--bg-hover); }
.turn-header-chevron {
  font-size: 10px;
  transition: transform 0.2s;
}
.turn.collapsed .turn-header-chevron { transform: rotate(-90deg); }
.turn-header-label { font-weight: 600; color: var(--text); }
.turn-header-ts { margin-left: auto; font-size: 10px; }
.turn-body {
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.turn.collapsed .turn-body { display: none; }

/* Role sections */
.role-section {
  padding: 8px 12px;
  margin: 4px 0;
  border-radius: 4px;
}
.role-section.role-user {
  background: var(--bg-surface);
  border-left: 3px solid var(--accent);
}
.role-section.role-assistant {
  border-left: 3px solid var(--cyan);
}
.role-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.role-label.role-user-label { color: var(--accent); }
.role-label.role-assistant-label { color: var(--cyan); }

/* Collapsible long content */
.collapsible-wrap { position: relative; }
.collapsible-wrap.is-collapsed .collapsible-content {
  max-height: 13em;
  overflow: hidden;
}
.collapsible-wrap.is-collapsed .collapsible-fade {
  display: block;
  position: absolute;
  bottom: 24px;
  left: 0;
  right: 0;
  height: 3em;
  background: linear-gradient(transparent, var(--bg));
  pointer-events: none;
}
.role-section.role-user .collapsible-wrap.is-collapsed .collapsible-fade {
  background: linear-gradient(transparent, var(--bg-surface));
}
.collapsible-fade { display: none; }
.collapsible-toggle {
  display: inline-block;
  font-size: 11px;
  color: var(--accent);
  cursor: pointer;
  padding: 2px 0;
  user-select: none;
  border: none;
  background: none;
  font-family: inherit;
}
.collapsible-toggle:hover { text-decoration: underline; }

/* Typing cursor */
.cursor {
  display: inline-block;
  width: 7px;
  height: 14px;
  background: var(--accent);
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
  margin-left: 2px;
}
@keyframes blink { 50% { opacity: 0; } }

/* Search */
.search-group {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
}
.search-group input[type="text"] {
  width: 140px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  font-family: inherit;
  font-size: 12px;
  outline: none;
}
.search-group input[type="text"]:focus {
  border-color: var(--accent);
}
.search-count {
  color: var(--text-dim);
  white-space: nowrap;
  min-width: 40px;
}
.search-group button {
  padding: 4px 8px;
  font-size: 11px;
}
mark.search-highlight {
  background: var(--orange);
  color: var(--bg);
  border-radius: 2px;
}
mark.search-highlight.active {
  background: var(--accent);
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>
<div class="container">
  <div class="controls">
    <button id="btn-prev" title="Previous turn">&larr;</button>
    <button id="btn-play" title="Play / Pause">&#9654;</button>
    <button id="btn-next" title="Next turn">&rarr;</button>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-text" id="progress-text">0 / 0</span>
    </div>
    <div class="speed-control">
      <span>Speed</span>
      <input type="range" id="speed-slider" min="0.5" max="5" step="0.5" value="/*INITIAL_SPEED*/">
      <span id="speed-label">/*INITIAL_SPEED*/x</span>
    </div>
    <div class="toggle-group">
      <label><input type="checkbox" id="toggle-thinking" /*CHECKED_THINKING*/> Thinking</label>
      <label><input type="checkbox" id="toggle-tools" /*CHECKED_TOOLS*/> Tools</label>
      <label><input type="checkbox" id="toggle-results" /*CHECKED_RESULTS*/> Results</label>
    </div>
    <div class="search-group">
      <input type="text" id="search-input" placeholder="Search...">
      <span class="search-count" id="search-count">0 of 0</span>
      <button id="search-prev" title="Previous match">&uarr;</button>
      <button id="search-next" title="Next match">&darr;</button>
    </div>
  </div>
  <div class="transcript" id="transcript"></div>
</div>

<script>
(function() {
  "use strict";

  const TURNS = /*TURNS_JSON*/[];
  let currentTurn = 0;
  let playing = false;
  let playTimer = null;
  let speed = /*INITIAL_SPEED*/1;

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const transcript = $("#transcript");
  const btnPlay = $("#btn-play");
  const btnPrev = $("#btn-prev");
  const btnNext = $("#btn-next");
  const progressFill = $("#progress-fill");
  const progressText = $("#progress-text");
  const progressBar = $("#progress-bar");
  const speedSlider = $("#speed-slider");
  const speedLabel = $("#speed-label");
  const toggleThinking = $("#toggle-thinking");
  const toggleTools = $("#toggle-tools");
  const toggleResults = $("#toggle-results");

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  function truncate(text, max) {
    if (!text) return "";
    const s = typeof text === "string" ? text : JSON.stringify(text);
    const oneLine = s.replace(/\n/g, " ").trim();
    return oneLine.length > max ? oneLine.slice(0, max) + "..." : oneLine;
  }

  function formatInput(input) {
    if (typeof input === "string") return escapeHtml(input);
    try {
      return escapeHtml(JSON.stringify(input, null, 2));
    } catch {
      return escapeHtml(String(input));
    }
  }

  function countLines(text) {
    if (!text) return 0;
    return text.split("\n").length;
  }

  function wrapCollapsible(contentHtml, totalLines, threshold) {
    if (totalLines <= threshold) return contentHtml;
    return `<div class="collapsible-wrap is-collapsed">
      <div class="collapsible-content">${contentHtml}</div>
      <div class="collapsible-fade"></div>
      <button class="collapsible-toggle" onclick="toggleCollapsible(this)">Show more (${totalLines} lines)</button>
    </div>`;
  }

  // Exposed globally for onclick
  window.toggleCollapsible = function(btn) {
    const wrap = btn.closest(".collapsible-wrap");
    const collapsed = wrap.classList.toggle("is-collapsed");
    const totalLines = wrap.querySelector(".collapsible-content").textContent.split("\n").length;
    btn.textContent = collapsed ? `Show more (${totalLines} lines)` : "Show less";
  };

  // Compute session start time from first turn
  const sessionStart = TURNS.length > 0 && TURNS[0].timestamp
    ? new Date(TURNS[0].timestamp).getTime()
    : null;

  function formatRelativeTime(ms) {
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    if (h > 0) return `+ ${h}h ${m}m ${s}s`;
    if (m > 0) return `+ ${m}m ${s}s`;
    return `+ ${s}s`;
  }

  function formatUtcTime(d) {
    return d.toISOString().replace("T", " ").replace(/\.\d+Z$/, " UTC");
  }

  function renderTurn(turn) {
    const el = document.createElement("div");
    el.className = "turn";
    el.dataset.index = turn.index;

    let html = "";

    // Turn header bar
    let relStr = "";
    let absStr = "";
    if (turn.timestamp) {
      const d = new Date(turn.timestamp);
      absStr = formatUtcTime(d);
      if (sessionStart != null) {
        const delta = d.getTime() - sessionStart;
        relStr = delta > 0 ? formatRelativeTime(delta) : "start";
      }
    }
    const tsHtml = relStr || absStr
      ? `<span class="turn-header-ts" ${absStr ? `title="${absStr}"` : ""}>${relStr || absStr}</span>`
      : "";
    html += `<div class="turn-header" onclick="this.parentElement.classList.toggle('collapsed')">
      <span class="turn-header-chevron">&#9660;</span>
      <span class="turn-header-label">#${turn.index}</span>
      ${tsHtml}
    </div>`;

    html += `<div class="turn-body">`;

    // User message
    if (turn.user_text) {
      const userLines = countLines(turn.user_text);
      const userContent = `<div class="user-text">${escapeHtml(turn.user_text)}</div>`;
      html += `<div class="role-section role-user">
        <div class="role-label role-user-label">/*USER_LABEL*/</div>
        ${wrapCollapsible(userContent, userLines, 10)}
      </div>`;
    }

    // Assistant blocks
    if (turn.blocks.length > 0) {
      html += `<div class="role-section role-assistant">`;
      html += `<div class="role-label role-assistant-label">/*ASSISTANT_LABEL*/</div>`;

      // Group consecutive tool_use blocks into runs
      const segments = [];
      let toolRun = [];
      for (const block of turn.blocks) {
        if (block.kind === "tool_use" && block.tool_call) {
          toolRun.push(block);
        } else {
          if (toolRun.length > 0) { segments.push({ type: "tools", blocks: toolRun }); toolRun = []; }
          segments.push({ type: "single", block });
        }
      }
      if (toolRun.length > 0) { segments.push({ type: "tools", blocks: toolRun }); }

      for (const seg of segments) {
        if (seg.type === "single") {
          const block = seg.block;
          if (block.kind === "text") {
            const lines = countLines(block.text);
            const textContent = `<div class="assistant-text">${escapeHtml(block.text)}</div>`;
            html += wrapCollapsible(textContent, lines, 15);
          } else if (block.kind === "thinking") {
            html += `<div class="thinking-block" data-type="thinking">
              <div class="thinking-header" onclick="this.parentElement.classList.toggle('open')">
                <span class="thinking-chevron">&#9654;</span> Thinking...
              </div>
              <div class="thinking-body">${escapeHtml(block.text)}</div>
            </div>`;
          }
        } else {
          // Consecutive tool calls
          const toolHtml = seg.blocks.map(block => {
            const tc = block.tool_call;
            const preview = truncate(tc.input, 60);
            let bodyHtml = `<div class="tool-input"><div class="tool-input-label">Input</div>${formatInput(tc.input)}</div>`;
            if (tc.result != null) {
              bodyHtml += `<div class="tool-result" data-type="result"><div class="tool-result-label">Result</div>${escapeHtml(tc.result)}</div>`;
            }
            return `<div class="tool-block" data-type="tool">
              <div class="tool-header" onclick="this.parentElement.classList.toggle('open')">
                <span class="tool-indicator"></span>
                <span class="tool-name">${escapeHtml(tc.name)}</span>
                <span class="tool-args-preview">${escapeHtml(preview)}</span>
                <span class="tool-chevron">&#9654;</span>
              </div>
              <div class="tool-body">${bodyHtml}</div>
            </div>`;
          }).join("");

          if (seg.blocks.length <= 2) {
            // Short run — render inline without grouping
            html += toolHtml;
          } else {
            // Long run — wrap in collapsible group
            const names = seg.blocks.map(b => b.tool_call.name);
            const uniqueNames = [...new Set(names)].join(", ");
            html += `<div class="tool-group" data-type="tool">
              <div class="tool-group-header" onclick="this.parentElement.classList.toggle('open')">
                <span class="tool-group-chevron">&#9654;</span>
                ${seg.blocks.length} tool calls
                <span class="tool-group-names">${escapeHtml(uniqueNames)}</span>
              </div>
              <div class="tool-group-body">${toolHtml}</div>
            </div>`;
          }
        }
      }

      html += `</div>`; // close role-assistant
    }

    html += `</div>`; // close turn-body

    el.innerHTML = html;
    return el;
  }

  function updateProgress() {
    const total = TURNS.length;
    const pct = total ? (currentTurn / total) * 100 : 0;
    progressFill.style.width = pct + "%";
    progressText.textContent = currentTurn + " / " + total;
  }

  const CONTROLS_HEIGHT = 52;
  const PEEK_OFFSET = 20; // px of previous dimmed turn visible above

  function scrollToTurn(el) {
    // Wait for layout to be fully resolved before measuring
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const absTop = el.getBoundingClientRect().top + window.scrollY;
        const targetY = absTop - CONTROLS_HEIGHT - PEEK_OFFSET;
        window.scrollTo({ top: Math.max(0, targetY), behavior: "smooth" });
      });
    });
  }

  function setActiveTurn(index) {
    for (const el of $$(".turn.active")) el.classList.remove("active");
    if (index >= 0 && index < transcript.children.length) {
      transcript.children[index].classList.add("active");
    }
  }

  function showUpTo(index) {
    // Render turns that haven't been rendered yet
    const existing = transcript.children.length;
    for (let i = existing; i < index && i < TURNS.length; i++) {
      const el = renderTurn(TURNS[i]);
      transcript.appendChild(el);
      // Trigger reflow for animation
      el.offsetHeight;
      el.classList.add("visible");
    }
    currentTurn = Math.min(index, TURNS.length);
    updateProgress();
    setActiveTurn(currentTurn - 1);

    // Pin active turn just below the controls bar, with a peek of previous turn
    if (currentTurn > 0) {
      const el = transcript.children[currentTurn - 1];
      if (el) scrollToTurn(el);
    }
  }

  // Smooth scroll animation for auto-play on tall turns
  let scrollAnim = null;

  function cancelScrollAnim() {
    if (scrollAnim) { cancelAnimationFrame(scrollAnim); scrollAnim = null; }
  }

  function smoothScrollTo(targetY, duration, callback) {
    cancelScrollAnim();
    const startY = window.scrollY;
    const dist = targetY - startY;
    if (Math.abs(dist) < 2) { if (callback) callback(); return; }
    const startTime = performance.now();
    function step(now) {
      if (!playing) { cancelScrollAnim(); return; }
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      // ease-in-out
      const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      window.scrollTo(0, startY + dist * ease);
      if (t < 1) {
        scrollAnim = requestAnimationFrame(step);
      } else {
        scrollAnim = null;
        if (callback) callback();
      }
    }
    scrollAnim = requestAnimationFrame(step);
  }

  function stepForward() {
    if (currentTurn < TURNS.length) {
      showUpTo(currentTurn + 1);
    } else {
      stopPlay();
    }
  }

  function stepBack() {
    if (currentTurn > 1) {
      // Remove last turn, but never go below 1 (always keep first turn visible)
      const last = transcript.children[currentTurn - 1];
      if (last) {
        last.classList.remove("visible");
        last.classList.remove("active");
        setTimeout(() => last.remove(), 300);
      }
      currentTurn--;
      updateProgress();
      setActiveTurn(currentTurn - 1);
      // Pin active turn just below the controls bar
      if (currentTurn > 0) {
        const el = transcript.children[currentTurn - 1];
        if (el) scrollToTurn(el);
      }
    }
  }

  function startPlay() {
    if (currentTurn >= TURNS.length) {
      // Reset if at end
      transcript.innerHTML = "";
      currentTurn = 0;
    }
    playing = true;
    btnPlay.innerHTML = "&#9646;&#9646;";
    btnPlay.classList.add("active");
    playStep();
  }

  function stopPlay() {
    playing = false;
    cancelScrollAnim();
    btnPlay.innerHTML = "&#9654;";
    btnPlay.classList.remove("active");
    if (playTimer) { clearTimeout(playTimer); playTimer = null; }
  }

  function playStep() {
    if (!playing) return;
    if (currentTurn >= TURNS.length) { stopPlay(); return; }

    // Show next turn
    showUpTo(currentTurn + 1);

    const el = transcript.children[currentTurn - 1];
    if (!el) { stopPlay(); return; }

    // Wait for layout, then decide: scroll through or advance
    requestAnimationFrame(() => {
      if (!playing) return;
      const rect = el.getBoundingClientRect();
      const viewH = window.innerHeight - CONTROLS_HEIGHT;
      const overflow = rect.height - viewH;

      if (overflow > 50) {
        // Tall turn: first pause at top, then scroll to bottom, then advance
        const pauseTop = 800 / speed;
        const scrollDuration = Math.min(Math.max(overflow / speed * 3, 1500 / speed), 8000 / speed);
        const targetY = el.offsetTop - CONTROLS_HEIGHT + el.offsetHeight - viewH;

        playTimer = setTimeout(() => {
          if (!playing) return;
          smoothScrollTo(targetY, scrollDuration, () => {
            if (!playing) return;
            // Pause at bottom before next step
            playTimer = setTimeout(() => {
              if (!playing) return;
              playStep();
            }, 800 / speed);
          });
        }, pauseTop);
      } else {
        // Short turn: just wait then advance
        const delay = 1500 / speed;
        playTimer = setTimeout(() => {
          if (!playing) return;
          playStep();
        }, delay);
      }
    });
  }

  function applyVisibility() {
    const showThinking = toggleThinking.checked;
    const showTools = toggleTools.checked;
    const showResults = toggleResults.checked;

    for (const el of $$('[data-type="thinking"]')) {
      el.style.display = showThinking ? "" : "none";
    }
    for (const el of $$('[data-type="tool"]')) {
      el.style.display = showTools ? "" : "none";
    }
    for (const el of $$('[data-type="result"]')) {
      el.style.display = showResults ? "" : "none";
    }
  }

  // Event listeners
  btnPlay.addEventListener("click", () => playing ? stopPlay() : startPlay());
  btnNext.addEventListener("click", stepForward);
  btnPrev.addEventListener("click", stepBack);

  speedSlider.addEventListener("input", () => {
    speed = parseFloat(speedSlider.value);
    speedLabel.textContent = speed + "x";
  });

  progressBar.addEventListener("click", (e) => {
    const rect = progressBar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const target = Math.round(pct * TURNS.length);
    // Reset and show up to target
    transcript.innerHTML = "";
    currentTurn = 0;
    showUpTo(target);
  });

  toggleThinking.addEventListener("change", applyVisibility);
  toggleTools.addEventListener("change", applyVisibility);
  toggleResults.addEventListener("change", applyVisibility);

  // Click on a turn to make it active
  transcript.addEventListener("click", (e) => {
    const turn = e.target.closest(".turn");
    if (!turn) return;
    const idx = parseInt(turn.dataset.index, 10);
    setActiveTurn(idx - 1);
    currentTurn = idx;
    updateProgress();
  });

  // Keyboard shortcuts
  document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT") return;
    if (e.key === " " || e.key === "k") { e.preventDefault(); playing ? stopPlay() : startPlay(); }
    if (e.key === "ArrowRight" || e.key === "l") { e.preventDefault(); stepForward(); }
    if (e.key === "ArrowLeft" || e.key === "h") { e.preventDefault(); stepBack(); }
  });

  // --- Search ---
  const searchInput = $("#search-input");
  const searchCount = $("#search-count");
  const searchPrevBtn = $("#search-prev");
  const searchNextBtn = $("#search-next");

  let searchMatches = [];
  let currentMatch = -1;
  let searchDebounce = null;
  let allTurnsRendered = false;

  function clearHighlights() {
    for (const m of document.querySelectorAll("mark.search-highlight")) {
      const parent = m.parentNode;
      parent.replaceChild(document.createTextNode(m.textContent), m);
      parent.normalize();
    }
    searchMatches = [];
    currentMatch = -1;
  }

  function updateSearchCount() {
    if (searchMatches.length === 0) {
      searchCount.textContent = "0 of 0";
    } else {
      searchCount.textContent = (currentMatch + 1) + " of " + searchMatches.length;
    }
  }

  function goToMatch(index) {
    if (searchMatches.length === 0) return;
    // Remove active from previous
    if (currentMatch >= 0 && currentMatch < searchMatches.length) {
      searchMatches[currentMatch].classList.remove("active");
    }
    currentMatch = ((index % searchMatches.length) + searchMatches.length) % searchMatches.length;
    const mark = searchMatches[currentMatch];
    mark.classList.add("active");

    // Expand any collapsed ancestors
    let node = mark;
    while (node && node !== document.body) {
      if (node.classList) {
        // Expand collapsed turns
        if (node.classList.contains("turn") && node.classList.contains("collapsed")) {
          node.classList.remove("collapsed");
        }
        // Expand tool blocks
        if (node.classList.contains("tool-block") && !node.classList.contains("open")) {
          node.classList.add("open");
        }
        // Expand tool groups
        if (node.classList.contains("tool-group") && !node.classList.contains("open")) {
          node.classList.add("open");
        }
        // Expand thinking blocks
        if (node.classList.contains("thinking-block") && !node.classList.contains("open")) {
          node.classList.add("open");
        }
        // Expand collapsed collapsible-wraps
        if (node.classList.contains("collapsible-wrap") && node.classList.contains("is-collapsed")) {
          node.classList.remove("is-collapsed");
          const btn = node.querySelector(".collapsible-toggle");
          if (btn) btn.textContent = "Show less";
        }
      }
      node = node.parentNode;
    }

    mark.scrollIntoView({ behavior: "smooth", block: "center" });
    updateSearchCount();
  }

  function performSearch(query) {
    clearHighlights();
    if (!query) {
      updateSearchCount();
      return;
    }

    // Ensure all turns are rendered
    if (!allTurnsRendered) {
      showUpTo(TURNS.length);
      allTurnsRendered = true;
    }

    const containers = document.querySelectorAll(".user-text, .assistant-text, .tool-input, .tool-result, .thinking-body");
    const queryLower = query.toLowerCase();

    for (const container of containers) {
      const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
      const textNodes = [];
      let n;
      while ((n = walker.nextNode())) textNodes.push(n);

      for (const textNode of textNodes) {
        const text = textNode.textContent;
        const textLower = text.toLowerCase();
        let startIdx = 0;
        const indices = [];
        while (true) {
          const pos = textLower.indexOf(queryLower, startIdx);
          if (pos === -1) break;
          indices.push(pos);
          startIdx = pos + queryLower.length;
        }
        if (indices.length === 0) continue;

        // Split text node and wrap matches
        const frag = document.createDocumentFragment();
        let lastEnd = 0;
        for (const pos of indices) {
          if (pos > lastEnd) {
            frag.appendChild(document.createTextNode(text.slice(lastEnd, pos)));
          }
          const mark = document.createElement("mark");
          mark.className = "search-highlight";
          mark.textContent = text.slice(pos, pos + query.length);
          frag.appendChild(mark);
          searchMatches.push(mark);
          lastEnd = pos + query.length;
        }
        if (lastEnd < text.length) {
          frag.appendChild(document.createTextNode(text.slice(lastEnd)));
        }
        textNode.parentNode.replaceChild(frag, textNode);
      }
    }

    if (searchMatches.length > 0) {
      goToMatch(0);
    } else {
      updateSearchCount();
    }
  }

  searchInput.addEventListener("input", () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => performSearch(searchInput.value.trim()), 200);
  });

  searchNextBtn.addEventListener("click", () => {
    if (searchMatches.length > 0) goToMatch(currentMatch + 1);
  });

  searchPrevBtn.addEventListener("click", () => {
    if (searchMatches.length > 0) goToMatch(currentMatch - 1);
  });

  searchInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      if (searchMatches.length > 0) {
        goToMatch(e.shiftKey ? currentMatch - 1 : currentMatch + 1);
      }
    }
    if (e.key === "Escape") {
      searchInput.value = "";
      performSearch("");
      searchInput.blur();
    }
  });

  // Ctrl+F / Cmd+F focuses search input
  document.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "f") {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
  });

  // Init
  updateProgress();
  // Show first turn immediately
  if (TURNS.length > 0) showUpTo(1);
})();
</script>
</body>
</html>
